site_name: C3 HTTP Request
site_url: https://chriscrosscrash.github.io/c3-http-request/
repo_url: https://github.com/ChrisCrossCrash/c3-http-request
repo_name: ChrisCrossCrash/c3-http-request

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - admonition
